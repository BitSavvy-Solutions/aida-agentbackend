name: Trigger auto deployment for aida-agentbackend-dev

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ dev ]
    paths:
    - '**'
    - '.github/workflows/aida-agentbackend-dev-AutoDeployTrigger-dbe9cb29-9607-4609-aae6-69889399f71c.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AIDAAGENTBACKENDDEV_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AIDAAGENTBACKENDDEV_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AIDAAGENTBACKENDDEV_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: iverseregistry.azurecr.io
          registryUsername: ${{ secrets.AIDAAGENTBACKENDDEV_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.AIDAAGENTBACKENDDEV_REGISTRY_PASSWORD }}
          containerAppName: aida-agentbackend-dev
          resourceGroup: iverse
          imageToBuild: iverseregistry.azurecr.io/aida-agentbackend-dev:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


